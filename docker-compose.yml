services:
  postgres:
    image: postgres:16-alpine
    container_name: aggregator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_ultimate}
    ports:
      - "${POSTGRES_PORT_PUBLISHED:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: &json-logging
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: aggregator-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-2gb}
      - --maxmemory-policy
      - ${REDIS_EVICTION_POLICY:-allkeys-lru}
    ports:
      - "${REDIS_PORT_PUBLISHED:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *json-logging

  api-service:
    build:
      context: .
    image: aggregator-services:local
    restart: unless-stopped
    entrypoint: ["/app/api-service"]
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT_PUBLISHED:-8080}:8080"
    healthcheck:
      test: ["CMD", "/app/api-service", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *json-logging

  scheduler-service:
    image: aggregator-services:local
    restart: "no"
    entrypoint: ["/app/scheduler-service"]
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      postgres:
        condition: service_healthy
    logging: *json-logging

  collector-service:
    image: aggregator-services:local
    restart: "no"
    entrypoint: ["/app/collector-service"]
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *json-logging

  retention-service:
    image: aggregator-services:local
    restart: "no"
    entrypoint: ["/app/retention-service"]
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      postgres:
        condition: service_healthy
    logging: *json-logging

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT_PUBLISHED:-9090}:9090"
    depends_on:
      - api-service
    logging: *json-logging

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["grafana"]
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT_PUBLISHED:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    logging: *json-logging

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: ${AGGREGATOR_NETWORK_NAME:-aggregator-services}
    external: ${AGGREGATOR_NETWORK_EXTERNAL:-false}
